<html lang="en">
<head>

<title>BTC Bro — Content Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --orange: #f7931a;
    --orange-dim: rgba(247,147,26,0.12);
    --orange-glow: rgba(247,147,26,0.25);
    --green: #00c896;
    --red: #ff4444;
    --text: #e8e8e8;
    --muted: #666;
    --muted2: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(247,147,26,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .btc-icon {
    width: 40px;
    height: 40px;
    background: var(--orange);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: #000;
    box-shadow: 0 0 20px var(--orange-glow);
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .logo-text p {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    margin-top: 3px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
  }

  .stat {
    text-align: right;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--orange);
    letter-spacing: 1px;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Section labels */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Controls panel */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .control-group label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .control-group select,
  .control-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .control-group select:focus,
  .control-group input:focus {
    border-color: var(--orange);
  }

  .context-input {
    margin-bottom: 20px;
  }

  .context-input textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .context-input textarea:focus {
    border-color: var(--orange);
  }

  .context-input textarea::placeholder {
    color: var(--muted2);
  }

  /* Type toggles */
  .type-toggles {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .toggle-btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .toggle-btn.active {
    background: var(--orange-dim);
    border-color: var(--orange);
    color: var(--orange);
  }

  .toggle-btn:hover:not(.active) {
    border-color: var(--muted2);
    color: var(--text);
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover {
    background: #ff9f20;
    box-shadow: 0 0 24px var(--orange-glow);
    transform: translateY(-1px);
  }

  .generate-btn:active {
    transform: translateY(0);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Loading state */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn-loading .spinner { display: block; }
  .btn-loading .btn-text { opacity: 0.7; }

  /* Results */
  #results {
    display: none;
  }

  .posts-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Post card */
  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .post-card:hover {
    border-color: var(--muted2);
  }

  .post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .post-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .badge-edgy { background: rgba(255,68,68,0.15); color: #ff6b6b; border: 1px solid rgba(255,68,68,0.3); }
  .badge-callout { background: rgba(247,147,26,0.15); color: var(--orange); border: 1px solid rgba(247,147,26,0.3); }
  .badge-anecdote { background: rgba(0,200,150,0.12); color: var(--green); border: 1px solid rgba(0,200,150,0.25); }
  .badge-identity { background: rgba(150,100,255,0.12); color: #b08aff; border: 1px solid rgba(150,100,255,0.25); }
  .badge-data { background: rgba(0,160,255,0.12); color: #5cb8ff; border: 1px solid rgba(0,160,255,0.25); }

  .post-day {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .post-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }

  .icon-btn:hover {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-dim);
  }

  .icon-btn.copied {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,200,150,0.1);
  }

  .post-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .post-timing {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .timing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }

  .post-score {

    align-items: center;

    border-radius: 2px;

  }

  .score-fill {
    height: 100%;
    background: var(--orange);

  }

  .score-label {
    color: var(--muted);
    font-size: 10px;
  }

  /* Insight strip */
  .insight-strip {
    background: var(--orange-dim);
    border: 1px solid rgba(247,147,26,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: rgba(247,147,26,0.9);
    font-family: 'DM Mono', monospace;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* Schedule view */
  .schedule-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .view-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 3px;
    gap: 2px;
  }

  .view-btn {
    padding: 5px 12px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .view-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* Error state */
  .error-msg {
    background: rgba(255,68,68,0.1);
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    color: #ff6b6b;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  /* Empty prompt hint */
  .hint-text {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* Char counter */
  .char-counter {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
  }

  .char-counter.over { color: var(--red); background: rgba(255,68,68,0.1); }
  .char-counter.close { color: var(--orange); }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  /* Regenerate individual */
  .regen-btn {
    font-family: 'DM Mono', monospace;

    color: var(--text);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    // ensure at least one active
    const active = document.querySelectorAll('.toggle-btn.active');
    if (active.length === 0) btn.classList.add('active');
  });
});

// ── Get selected types ─────────────────────────────────────
function getSelectedTypes() {
  return [...document.querySelectorAll('.toggle-btn.active')].map(b => b.dataset.type);
}

    anecdote: `RELATABLE ANECDOTE: First-person story with a Bitcoin punchline. 2-5 sentences. Examples of format/energy:

- "Every time I smash buy bitcoin drops by another $1k."
Personal, relatable, ends with a twist or insight. Include $BTC or relevant ticker.`,

    identity: `IDENTITY / BOOKMARK: Declarative truth that Bitcoiners want to save and share. Motivational but not cringe. Examples of format/energy:
- "Stacking sats is like the gym and clean eating. Most days suck and progress feels invisible. Until one day you look back and can't believe how far you've come."
- "You panic buy Bitcoin when the price is going parabolic. I panic buy Bitcoin when the price is dumping. We are not the same."
- "The bitcoiners who don't panic make it the furthest."
Include $BTC ticker.`,

    data: `DATA DROP: Real-time or recent BTC/$MSTR/$STRC data point + sharp reaction. 1-3 lines. Examples of format/energy:
- "2,000 BTC stacked via $STRC. And it's only noon…."
- "788 BTC added to the balance sheet with no dilution to common shareholders."
- "Banks paid 10% interest on savings accounts in the late 70s and early 80s. Now they pay 0.01%. $STRC isn't too good to be true."
Reference real or plausible current data. Include relevant tickers.`,
  };

  const selectedDescs = types.map(t => typesDesc[t]).filter(Boolean).join('\n\n');

  return `You are generating X (Twitter) posts for @BTC_broo — a Bitcoin maximalist account with 7,568 followers, focused on #Bitcoin | #Fitness | #Finance. Audience is 73% male, 62% aged 18-34, 53% US-based.

PERFORMANCE DATA (from 1 year of analytics):
- Top posts hit 60-70K impressions
- Posts with $BTC/$MSTR/$STRC tickers average 3x more impressions
- Statements outperform questions
- Saturday and Thursday are best days
- Best format: ultra-short, punchy, slightly edgy takes
- DO NOT use em dashes (—) in any post

CONTENT TYPES TO GENERATE:
${selectedDescs}

CURRENT CONTEXT:
- BTC Price: ${btcPrice || 'not specified'}
- Market mood: ${mood}
${context ? `- This week: ${context}` : ''}

RULES:
1. Never copy example posts — generate original content in the same energy
2. Always include at least one ticker ($BTC, $MSTR, or $STRC) per post
3. No hashtags unless they feel completely natural
4. No em dashes
5. No generic AI-sounding phrases
6. Voice: direct, unfiltered, Bitcoin-pilled, slightly irreverent
7. Each post must feel distinctly different from the others

Return ONLY a JSON array with exactly ${count} objects. Each object:
{
  "text": "the post text",
  "type": "edgy|callout|anecdote|identity|data",
  "score": <integer 1-100 representing estimated viral potential based on historical data>,
  "insight": "<one short sentence on why this should perform — specific, not generic>"
}

Return ONLY the JSON array, no markdown, no explanation.`;
}

// ── Generate posts ─────────────────────────────────────────
async function generatePosts() {
  const btn = document.getElementById('generateBtn');
  const errorMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');
  const grid = document.getElementById('postsGrid');

  const types = getSelectedTypes();
  const count = parseInt(document.getElementById('postCount').value);
  const btcPrice = document.getElementById('btcPrice').value.trim();
  const mood = document.getElementById('marketMood').value;
  const context = document.getElementById('weekContext').value.trim();

  errorMsg.style.display = 'none';
  btn.disabled = true;
  btn.classList.add('btn-loading');
  btn.querySelector('.btn-text').textContent = 'GENERATING...';

  try {
    const systemPrompt = buildSystemPrompt(types, count, btcPrice, mood, context);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Generate ${count} posts for this week. Types to use: ${types.join(', ')}. Distribute evenly across types where possible.` }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const posts = JSON.parse(clean);

    renderPosts(posts, count);
    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    errorMsg.textContent = 'Failed to generate posts. Check your connection and try again. Error: ' + err.message;
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
    btn.querySelector('.btn-text').textContent = 'GENERATE POSTS';
  }
}

// ── Render posts ───────────────────────────────────────────
function renderPosts(posts, count) {
  const grid = document.getElementById('postsGrid');
  grid.innerHTML = '';

  posts.forEach((post, i) => {
    const slotNum = (i % 7) + 1;
    const sched = SCHEDULE[slotNum] || SCHEDULE[1];
    const typeConf = TYPE_CONFIG[post.type] || TYPE_CONFIG['callout'];
    const delay = i * 80;

    const card = document.createElement('div');
    card.className = 'post-card';
    card.style.animationDelay = delay + 'ms';

    const scoreWidth = Math.min(100, Math.max(10, post.score || 50));
    const charCount = post.text.length;
    const charClass = charCount > 250 ? 'over' : charCount > 200 ? 'close' : '';

    card.innerHTML = `
      <div class="post-header">
        <div class="post-meta">
          <span class="post-type-badge ${typeConf.badge}">${typeConf.icon} ${typeConf.label}</span>
          <span class="post-day">${sched.day}</span>
        </div>
        <div class="post-actions">
          <span class="char-counter ${charClass}">${charCount}</span>
          <button class="icon-btn regen-single" title="Regenerate this post" onclick="regenSingle(this, '${post.type}')">↻</button>
          <button class="icon-btn copy-btn" title="Copy post" onclick="copyPost(this, \`${escapeBacktick(post.text)}\`)">⎘</button>
        </div>
      </div>
      <div class="post-text">${escapeHtml(post.text)}</div>
      <div class="post-footer">
        <div class="post-timing">
          <div class="timing-dot"></div>
          ${sched.time} &nbsp;·&nbsp; ${sched.note}
        </div>
        <div class="post-score">
          <span class="score-label">REACH EST</span>
          <div class="score-bar"><div class="score-fill" style="width:${scoreWidth}%"></div></div>
          <span style="color:var(--muted);font-size:10px;">${typeConf.reach}</span>
        </div>
      </div>
      ${post.insight ? `<div class="insight-strip">💡 ${post.insight}</div>` : ''}
    `;

    grid.appendChild(card);
  });
}

// ── Regen single post ──────────────────────────────────────
async function regenSingle(btn, type) {
  const card = btn.closest('.post-card');
  const textEl = card.querySelector('.post-text');
  const mood = document.getElementById('marketMood').value;
  const btcPrice = document.getElementById('btcPrice').value.trim();
  const context = document.getElementById('weekContext').value.trim();

  btn.textContent = '⟳';
  btn.disabled = true;

  try {
    const systemPrompt = buildSystemPrompt([type], 1, btcPrice, mood, context);
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Generate 1 post of type: ${type}. Make it completely different from typical outputs.` }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const posts = JSON.parse(clean);
    const post = Array.isArray(posts) ? posts[0] : posts;

    textEl.textContent = post.text;
    const charEl = card.querySelector('.char-counter');
    charEl.textContent = post.text.length;
    charEl.className = 'char-counter' + (post.text.length > 250 ? ' over' : post.text.length > 200 ? ' close' : '');

    if (post.insight) {
      const insightEl = card.querySelector('.insight-strip');
      if (insightEl) insightEl.textContent = '💡 ' + post.insight;
    }

    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'slideIn 0.25s ease forwards';

  } catch(e) {
    textEl.textContent = '[Regen failed — try again]';
  } finally {
    btn.textContent = '↻';
    btn.disabled = false;
  }
}

// ── Copy ───────────────────────────────────────────────────
async function copyPost(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘';
      btn.classList.remove('copied');
    }, 1800);
  } catch(e) {
    btn.textContent = '!';
    setTimeout(() => btn.textContent = '⎘', 1500);
  }
}

// ── Utils ──────────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeBacktick(str) {
  return str.replace(/`/g,'\\`').replace(/\$/g,'\\$');
}

<script>
// Show install banner on mobile if not already installed
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
const dismissed = localStorage.getItem('install-dismissed');

if (isIOS && !isStandalone && !dismissed) {
  setTimeout(() => {
    document.getElementById('install-banner').style.display = 'flex';
  }, 3000);
}

function showInstallInstructions() {
  document.getElementById('install-modal').style.display = 'flex';
}
function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('install-dismissed', '1');
}

// Android PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
  document.getElementById('install-btn').textContent = 'INSTALL';
  document.getElementById('install-btn').onclick = async () => {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    dismissBanner();
  };
});
</script>
