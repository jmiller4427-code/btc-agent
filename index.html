<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f7931a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BTC Agent">
  <meta name="mobile-web-app-capable" content="yes">
<title>BTC Bro Content Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root { --bg:#0a0a0a;--surface:#111111;--surface2:#1a1a1a;--border:#222222;--orange:#f7931a;--orange-dim:rgba(247,147,26,0.12);--orange-glow:rgba(247,147,26,0.25);--green:#00c896;--red:#ff4444;--text:#e8e8e8;--muted:#666;--muted2:#444; }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden; }
  body::before { content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(247,147,26,0.08) 0%,transparent 60%);pointer-events:none;z-index:0; }
  .container { max-width:900px;margin:0 auto;padding:0 24px;position:relative;z-index:1; }
  header { padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px; }
  .header-inner { display:flex;align-items:center;justify-content:space-between; }
  .logo { display:flex;align-items:center;gap:14px; }
  .btc-icon { width:40px;height:40px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#000;box-shadow:0 0 20px var(--orange-glow);flex-shrink:0; }
  .logo-text h1 { font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text);line-height:1; }
  .logo-text p { font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:3px; }
  .stats-bar { display:flex;gap:24px; }
  .stat { text-align:right; }
  .stat-val { font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange);letter-spacing:1px;line-height:1; }
  .stat-label { font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.5px;margin-top:2px; }
  .section-label { font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--orange);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px; }
  .section-label::after { content:'';flex:1;height:1px;background:var(--border); }
  .controls { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px; }
  .controls-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px; }
  .control-group label { display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase; }
  .control-group select,.control-group input { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color 0.2s;appearance:none;-webkit-appearance:none; }
  .control-group select:focus,.control-group input:focus { border-color:var(--orange); }
  .context-input { margin-bottom:20px; }
  .context-input textarea { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;resize:vertical;min-height:80px;transition:border-color 0.2s;line-height:1.5; }
  .context-input textarea:focus { border-color:var(--orange); }
  .context-input textarea::placeholder { color:var(--muted2); }
  .type-toggles { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px; }
  .toggle-btn { padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;white-space:nowrap;min-height:36px; }
  .toggle-btn.active { background:var(--orange-dim);border-color:var(--orange);color:var(--orange); }
  .toggle-btn:hover:not(.active) { border-color:var(--muted2);color:var(--text); }
  .generate-btn { width:100%;padding:14px;background:var(--orange);border:none;border-radius:8px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px; }
  .generate-btn:hover { background:#ff9f20;box-shadow:0 0 24px var(--orange-glow);transform:translateY(-1px); }
  .generate-btn:disabled { opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none; }
  .spinner { width:18px;height:18px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .btn-loading .spinner { display:block; }
  .btn-loading .btn-text { opacity:0.7; }
  #results { display:none; }
  .posts-grid { display:flex;flex-direction:column;gap:16px; }
  .post-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color 0.2s;animation:slideIn 0.3s ease forwards;opacity:0;transform:translateY(8px); }
  @keyframes slideIn { to { opacity:1;transform:translateY(0); } }
  .post-card:hover { border-color:var(--muted2); }
  .post-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
  .post-meta { display:flex;align-items:center;gap:8px; }
  .post-type-badge { font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase; }
  .badge-edgy { background:rgba(255,68,68,0.15);color:#ff6b6b;border:1px solid rgba(255,68,68,0.3); }
  .badge-callout { background:rgba(247,147,26,0.15);color:var(--orange);border:1px solid rgba(247,147,26,0.3); }
  .badge-anecdote { background:rgba(0,200,150,0.12);color:var(--green);border:1px solid rgba(0,200,150,0.25); }
  .badge-identity { background:rgba(150,100,255,0.12);color:#b08aff;border:1px solid rgba(150,100,255,0.25); }
  .badge-data { background:rgba(0,160,255,0.12);color:#5cb8ff;border:1px solid rgba(0,160,255,0.25); }
  .post-day { font-family:'DM Mono',monospace;font-size:11px;color:var(--muted); }
  .post-actions { display:flex;gap:6px; }
  .icon-btn { width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s; }
  .icon-btn:hover { border-color:var(--orange);color:var(--orange);background:var(--orange-dim); }
  .icon-btn.copied { border-color:var(--green);color:var(--green);background:rgba(0,200,150,0.1); }
  .post-text { font-size:15px;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word; }
  .post-footer { margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .post-timing { font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px; }
  .timing-dot { width:6px;height:6px;border-radius:50%;background:var(--orange); }
  .post-score { display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:11px; }
  .score-bar { width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden; }
  .score-fill { height:100%;background:var(--orange);border-radius:2px;transition:width 0.5s ease; }
  .score-label { color:var(--muted);font-size:10px; }
  .insight-strip { background:var(--orange-dim);border:1px solid rgba(247,147,26,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(247,147,26,0.9);font-family:'DM Mono',monospace;margin-top:10px;line-height:1.5; }
  .char-counter { font-family:'DM Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--muted); }
  .char-counter.over { color:var(--red);background:rgba(255,68,68,0.1); }
  .char-counter.close { color:var(--orange); }
  .divider { height:1px;background:var(--border);margin:32px 0; }
  .schedule-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
  .week-label { font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text); }
  .error-msg { background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:8px;padding:14px 16px;color:#ff6b6b;font-size:13px;margin-bottom:16px;display:none; }
  .hint-text { font-size:12px;color:var(--muted);margin-top:6px;font-family:'DM Mono',monospace; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border);border-radius:3px; }
  /* iOS PWA */
  .container { padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right));padding-bottom:env(safe-area-inset-bottom); }
  header { padding-top:max(40px,calc(env(safe-area-inset-top) + 20px)); }
  @media (max-width:600px) { .controls-grid{grid-template-columns:1fr 1fr} .stats-bar{display:none} .header-inner{flex-direction:column;align-items:flex-start;gap:16px} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="btc-icon">&#x20BF;</div>
        <div class="logo-text">
          <h1>CONTENT AGENT</h1>
          <p>@BTC_BROO &mdash; WEEKLY POST GENERATOR</p>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat"><div class="stat-val">7,568</div><div class="stat-label">Followers</div></div>
        <div class="stat"><div class="stat-val">~1M</div><div class="stat-label">Yr Impressions</div></div>
        <div class="stat"><div class="stat-val">3.5%</div><div class="stat-label">Eng Rate</div></div>
      </div>
    </div>
  </header>
  <div class="section-label">Configure</div>
  <div class="controls">
    <div class="controls-grid">
      <div class="control-group">
        <label>Posts to generate</label>
        <select id="postCount">
          <option value="5">5 posts</option>
          <option value="7" selected>7 posts (1 week)</option>
          <option value="10">10 posts</option>
          <option value="14">14 posts (2 weeks)</option>
        </select>
      </div>
      <div class="control-group">
        <label>BTC Price Context</label>
        <input type="text" id="btcPrice" placeholder="e.g. $71,000 consolidating" />
      </div>
      <div class="control-group">
        <label>Market Mood</label>
        <select id="marketMood">
          <option value="bullish">Bullish</option>
          <option value="bearish">Bearish / Fear</option>
          <option value="neutral" selected>Neutral / Sideways</option>
          <option value="euphoria">Euphoria / ATH</option>
          <option value="capitulation">Capitulation</option>
        </select>
      </div>
    </div>
    <div class="section-label" style="margin-top:4px;">Post Types</div>
    <div class="type-toggles">
      <button class="toggle-btn active" data-type="edgy">&#x26A1; Edgy 2-liner</button>
      <button class="toggle-btn active" data-type="callout">&#x1F3AF; Callout / Contrarian</button>
      <button class="toggle-btn active" data-type="anecdote">&#x1F4AC; Relatable Anecdote</button>
      <button class="toggle-btn active" data-type="identity">&#x1F4CC; Identity / Bookmark</button>
      <button class="toggle-btn active" data-type="data">&#x1F4CA; Data Drop</button>
    </div>
    <div class="context-input">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">What's happening this week? (optional)</label>
      </div>
      <textarea id="weekContext" placeholder="e.g. Saylor announced $2B buy. BTC at $71K. Fed meeting Tuesday. FOMC dot plot..."></textarea>
      <div class="hint-text">Drop in any recent news, events, or angles you want woven in.</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="generate-btn" id="generateBtn" onclick="generatePosts()">
      <div class="spinner"></div>
      <span class="btn-text">GENERATE POSTS</span>
    </button>
  </div>
  <div id="results">
    <div class="schedule-header"><div class="week-label">THIS WEEK'S QUEUE</div></div>
    <div class="posts-grid" id="postsGrid"></div>
    <div class="divider"></div>
    <button class="generate-btn" onclick="generatePosts()" style="margin-bottom:48px;">
      <span class="btn-text">REGENERATE ALL</span>
    </button>
  </div>
</div>
<script>
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    if (!document.querySelectorAll('.toggle-btn.active').length) btn.classList.add('active');
  });
});
function getSelectedTypes() { return [...document.querySelectorAll('.toggle-btn.active')].map(b => b.dataset.type); }
const SCHEDULE = {
  1:{day:'MON',time:'9:00 AM EST',note:'Reliable opener'},
  2:{day:'TUE',time:'8:30 AM EST',note:'High eng rate day'},
  3:{day:'WED',time:'12:00 PM EST',note:'Midweek - keep sharp'},
  4:{day:'THU',time:'7:00 PM EST',note:'Strong evening slot'},
  5:{day:'FRI',time:'8:00 AM EST',note:'Pre-weekend push'},
  6:{day:'SAT',time:'10:00 AM EST',note:'Best avg impressions'},
  7:{day:'SUN',time:'11:00 AM EST',note:'Lighter, reflective'},
};
const TYPE_CONFIG = {
  edgy:{label:'Edgy 2-liner',badge:'badge-edgy',reach:'30-70K',icon:'&#x26A1;'},
  callout:{label:'Callout',badge:'badge-callout',reach:'20-50K',icon:'&#x1F3AF;'},
  anecdote:{label:'Relatable Anecdote',badge:'badge-anecdote',reach:'10-25K',icon:'&#x1F4AC;'},
  identity:{label:'Identity / Bookmark',badge:'badge-identity',reach:'5-15K',icon:'&#x1F4CC;'},
  data:{label:'Data Drop',badge:'badge-data',reach:'10-15K',icon:'&#x1F4CA;'},
};
function buildSystemPrompt(types,count,btcPrice,mood,context){
  const typesDesc={
    edgy:'EDGY 2-LINER: Ultra short 1-3 lines. Provocative Bitcoin culture. Examples (energy only, NOT to copy): "Saylor does not fit in with pedos. Bullish for $MSTR" / "21M" / "Epstein is Satoshi is the final FUD boss". Always include $BTC $MSTR or $STRC.',
    callout:'CALLOUT/CONTRARIAN: Direct personal position 1-4 sentences. Examples: "If you are not buying Bitcoin at $64k waiting for $58k, you are retarded." / "I own 0 precious metals. All in on bitcoin." State your position hard. Include $BTC.',
    anecdote:'RELATABLE ANECDOTE: First-person story with BTC punchline 2-5 sentences. Examples: "My girlfriend overheard at the salon Bitcoin is not doing well. Market bottom." / "Every time I smash buy bitcoin drops another $1k." Include $BTC.',
    identity:'IDENTITY/BOOKMARK: Declarative truth Bitcoiners save and share. Examples: "Stacking sats is like the gym. Most days suck and progress feels invisible. Until one day you look back and cannot believe how far you have come." Include $BTC.',
    data:'DATA DROP: Real BTC/$MSTR/$STRC data point plus sharp reaction 1-3 lines. Examples: "2000 BTC stacked via $STRC. And it is only noon." / "Banks paid 10% on savings in the 70s. Now 0.01%. $STRC is not too good to be true." Include tickers.',
  };
  const selectedDescs=types.map(t=>typesDesc[t]).filter(Boolean).join('

');
  return 'You generate X posts for @BTC_broo - Bitcoin maximalist, 7568 followers, #Bitcoin #Fitness #Finance. Audience 73% male, 62% 18-34, 53% US.

PERFORMANCE: Top posts 60-70K impressions. Ticker posts 3x more reach. Statements beat questions. Sat/Thu best days. Short punchy edgy = best format. NEVER use em dashes.

TYPES:
'+selectedDescs+'

CONTEXT:
- BTC: '+(btcPrice||'not specified')+'
- Mood: '+mood+(context?'
- This week: '+context:'')+'

RULES: Never copy examples. Always include one ticker per post. No hashtags. No em dashes. No AI phrases. Voice: direct unfiltered Bitcoin-pilled irreverent. Each post distinctly different.

Return ONLY JSON array of exactly '+count+' objects: {"text":"...","type":"edgy|callout|anecdote|identity|data","score":1-100,"insight":"one sentence why it performs"}';
}
async function generatePosts(){
  const btn=document.getElementById('generateBtn');
  const errorMsg=document.getElementById('errorMsg');
  const results=document.getElementById('results');
  const types=getSelectedTypes();
  const count=parseInt(document.getElementById('postCount').value);
  const btcPrice=document.getElementById('btcPrice').value.trim();
  const mood=document.getElementById('marketMood').value;
  const context=document.getElementById('weekContext').value.trim();
  errorMsg.style.display='none';
  btn.disabled=true;btn.classList.add('btn-loading');
  btn.querySelector('.btn-text').textContent='GENERATING...';
  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:buildSystemPrompt(types,count,btcPrice,mood,context),messages:[{role:'user',content:'Generate '+count+' posts. Types: '+types.join(', ')+'. Distribute evenly.'}]})
    });
    const data=await response.json();
    const raw=data.content?.[0]?.text||'';
    const posts=JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderPosts(posts,count);
    results.style.display='block';
    results.scrollIntoView({behavior:'smooth',block:'start'});
  }catch(err){
    errorMsg.textContent='Failed: '+err.message;
    errorMsg.style.display='block';
  }finally{
    btn.disabled=false;btn.classList.remove('btn-loading');
    btn.querySelector('.btn-text').textContent='GENERATE POSTS';
  }
}
function renderPosts(posts,count){
  const grid=document.getElementById('postsGrid');
  grid.innerHTML='';
  posts.forEach((post,i)=>{
    const sched=SCHEDULE[(i%7)+1]||SCHEDULE[1];
    const typeConf=TYPE_CONFIG[post.type]||TYPE_CONFIG['callout'];
    const card=document.createElement('div');
    card.className='post-card';
    card.style.animationDelay=(i*80)+'ms';
    const scoreWidth=Math.min(100,Math.max(10,post.score||50));
    const charCount=post.text.length;
    const charClass=charCount>250?'over':charCount>200?'close':'';
    card.innerHTML=`<div class="post-header"><div class="post-meta"><span class="post-type-badge ${typeConf.badge}">${typeConf.icon} ${typeConf.label}</span><span class="post-day">${sched.day}</span></div><div class="post-actions"><span class="char-counter ${charClass}">${charCount}</span><button class="icon-btn" title="Regenerate" onclick="regenSingle(this,'${post.type}')">&#x21BB;</button><button class="icon-btn copy-btn" title="Copy" onclick="copyPost(this,this.dataset.text)" data-text="${post.text.replace(/"/g,'&quot;')}">&#x2398;</button></div></div><div class="post-text">${escapeHtml(post.text)}</div><div class="post-footer"><div class="post-timing"><div class="timing-dot"></div>${sched.time} &middot; ${sched.note}</div><div class="post-score"><span class="score-label">REACH</span><div class="score-bar"><div class="score-fill" style="width:${scoreWidth}%"></div></div><span style="color:var(--muted);font-size:10px">${typeConf.reach}</span></div></div>${post.insight?`<div class="insight-strip">&#x1F4A1; ${post.insight}</div>`:''}`;
    grid.appendChild(card);
  });
}
async function regenSingle(btn,type){
  const card=btn.closest('.post-card');
  const textEl=card.querySelector('.post-text');
  btn.textContent='&#x27F3;';btn.disabled=true;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:buildSystemPrompt([type],1,document.getElementById('btcPrice').value,document.getElementById('marketMood').value,document.getElementById('weekContext').value),messages:[{role:'user',content:'Generate 1 post type: '+type+'. Make it completely different.'}]})});
    const data=await resp.json();
    const posts=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    const post=Array.isArray(posts)?posts[0]:posts;
    textEl.textContent=post.text;
    const charEl=card.querySelector('.char-counter');
    charEl.textContent=post.text.length;
    charEl.className='char-counter'+(post.text.length>250?' over':post.text.length>200?' close':'');
    const copyBtn=card.querySelector('.copy-btn');
    if(copyBtn)copyBtn.dataset.text=post.text;
    if(post.insight){const ins=card.querySelector('.insight-strip');if(ins)ins.textContent='&#x1F4A1; '+post.insight;}
    card.style.animation='none';card.offsetHeight;card.style.animation='slideIn 0.25s ease forwards';
  }catch(e){textEl.textContent='[Regen failed]';}
  finally{btn.innerHTML='&#x21BB;';btn.disabled=false;}
}
async function copyPost(btn,text){
  try{
    await navigator.clipboard.writeText(text);
    btn.innerHTML='&#x2713;';btn.classList.add('copied');
    setTimeout(()=>{btn.innerHTML='&#x2398;';btn.classList.remove('copied');},1800);
  }catch(e){btn.textContent='!';setTimeout(()=>btn.innerHTML='&#x2398;',1500);}
}
function escapeHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/btc-agent/sw.js').catch(()=>{});});}
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone=window.navigator.standalone===true;
if(isIOS&&!isStandalone&&!localStorage.getItem('install-dismissed')){
  setTimeout(()=>{
    const b=document.createElement('div');
    b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;z-index:100;';
    b.innerHTML='<div style="font-size:13px;color:#e8e8e8">Add to Home Screen<br><span style="font-size:11px;color:#666;font-family:DM Mono,monospace">Tap Share then Add to Home Screen in Safari</span></div><button onclick="this.parentElement.remove();localStorage.setItem('install-dismissed',1)" style="background:#f7931a;color:#000;border:none;border-radius:8px;padding:10px 14px;font-family:Bebas Neue,sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;margin-left:12px">GOT IT</button>';
    document.body.appendChild(b);
  },3000);
}
</script>
